<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>⬡ Equb Win Simulator</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    html,body,#root{height:100%;background:#0b0f1a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;overflow:hidden}
    input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:#1e293b;border-radius:3px;outline:none;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:linear-gradient(135deg,#818cf8,#6366f1);border-radius:50%;cursor:pointer;border:2px solid #0b0f1a;box-shadow:0 2px 8px rgba(99,102,241,.5)}
    input[type=range]::-moz-range-thumb{width:24px;height:24px;background:#6366f1;border-radius:50%;border:2px solid #0b0f1a}
    .card{background:#141b2d;border:1px solid #1e293b;border-radius:16px;padding:14px}
    button{cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
    button:active{opacity:.8}
    /* BOTTOM SHEET */
    .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;backdrop-filter:blur(4px);transition:opacity .25s}
    .sheet{position:fixed;bottom:0;left:0;right:0;background:#0f1629;border-radius:20px 20px 0 0;border-top:1px solid #1e293b;z-index:101;max-height:88vh;overflow-y:auto;padding:0 16px 32px;transition:transform .3s cubic-bezier(.4,0,.2,1)}
    .sheet-handle{width:40px;height:4px;background:#334155;border-radius:2px;margin:12px auto 16px}
    /* TABS */
    .tabs-row{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:#0b0f1a;border-bottom:1px solid #1e293b}
    .tabs-row::-webkit-scrollbar{display:none}
    .tab-btn{padding:11px 16px;font-size:12px;font-weight:600;color:#64748b;background:transparent;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0}
    .tab-btn.on{color:#818cf8;border-bottom-color:#818cf8}
    /* METRIC CARDS */
    .metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    /* DESKTOP */
    @media(min-width:900px){
      .mobile-only{display:none!important}
      .desktop-layout{display:flex!important}
      .main-scroll{padding-bottom:16px!important}
      .metric-grid{grid-template-columns:repeat(4,1fr)}
    }
    @media(max-width:899px){
      .desktop-only{display:none!important}
    }
    .desktop-layout{display:none;height:100%}
    .desktop-sidebar{width:270px;flex-shrink:0;background:#0a0e1a;border-right:1px solid #1e293b;overflow-y:auto;padding:16px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── MATH ENGINE ─────────────────────────────────────────────────────────
function bC(n,k){if(k<0||k>n)return 0;if(!k||k===n)return 1;let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);return r}
function bPMF(k,n,p){return bC(n,k)*p**k*(1-p)**(n-k)}
function bCDF(k,n,p){let s=0;for(let i=0;i<=k;i++)s+=bPMF(i,n,p);return s}
function bPPF(q,n,p){let s=0;for(let k=0;k<=n;k++){s+=bPMF(k,n,p);if(s>=q)return k}return n}
const E={
  efw:(M,N)=>{let s=0;for(let k=0;k<N;k++)s+=(((N-k)/N)**M);return s},
  pwr1:(M,N)=>1-(1-1/N)**M,
  pbe:(M,N)=>1-bCDF(Math.ceil(M/N)-1,M,1/N),
  var95:(M,N,C)=>{const ec=C*N,pr=N*ec,w=bPPF(.05,M,1/N);return w*(pr-ec)+(M-w)*(-ec)},
  score:(M,N)=>(E.pwr1(M,N)+E.pbe(M,N))*50,
  winPMF:(M,N)=>{const p=1/N,o=[];for(let k=0;k<=Math.min(M,40);k++)o.push({k,p:bPMF(k,M,p)});return o},
  fwPMF:(M,N)=>{const o=[];for(let k=1;k<=N;k++)o.push({r:k,p:((N-k+1)/N)**M-((N-k)/N)**M});return o},
  mc:(N,M,C,cy,ns)=>{
    const R=cy*N,sims=[];let s=42;
    const rnd=()=>{s=(1664525*s+1013904223)&0xffffffff;return(s>>>0)/4294967295};
    for(let i=0;i<ns;i++){let w=M*C;const row=[w];for(let t=0;t<R;t++){let wins=0;for(let m=0;m<M;m++)if(rnd()<1/N)wins++;w=w-M*C+wins*N*C;row.push(w)}sims.push(row)}
    const mn=[],p10=[],p90=[];
    for(let t=0;t<=R;t++){const col=sims.map(r=>r[t]).sort((a,b)=>a-b);mn.push(col.reduce((a,b)=>a+b,0)/ns);p10.push(col[Math.floor(ns*.1)]);p90.push(col[Math.floor(ns*.9)])}
    return{rounds:[...Array(R+1).keys()],mn,p10,p90,cb:[...Array(cy).keys()].map(i=>(i+1)*N)}
  },
  opt:(N,tgt,met)=>{const fn=met==='pwr1'?M=>E.pwr1(M,N)*100:M=>E.pbe(M,N)*100;for(let M=1;M<=2000;M++)if(fn(M)>=tgt)return M;return 2000},
  sweep:(Ns,Ms,C)=>{const r=[];for(const n of Ns)for(const m of Ms)r.push({N:n,M:m,pwr1:+(E.pwr1(m,n)*100).toFixed(1),pbe:+(E.pbe(m,n)*100).toFixed(1),efw:+E.efw(m,n).toFixed(3),score:+E.score(m,n).toFixed(1),var95:+(Math.abs(E.var95(m,n,C))/1000).toFixed(1)});return r}
};

// ── HELPERS ──────────────────────────────────────────────────────────────
const CLRS=['#818cf8','#34d399','#fb923c','#f472b6','#60a5fa','#facc15'];
const PB={paper_bgcolor:'#0b0f1a',plot_bgcolor:'#0b0f1a',font:{color:'#94a3b8',size:11},margin:{t:24,b:40,l:48,r:10},xaxis:{gridcolor:'#1e293b',zerolinecolor:'#1e293b',automargin:true},yaxis:{gridcolor:'#1e293b',zerolinecolor:'#1e293b',automargin:true},legend:{bgcolor:'rgba(0,0,0,0)',orientation:'h',y:1.15,x:.5,xanchor:'center'},colorway:CLRS};
const pc=p=>p>=90?'#34d399':p>=65?'#fbbf24':'#f87171';
const sc=s=>s>=75?'#34d399':s>=60?'#fbbf24':'#f87171';

// ── PLOT ─────────────────────────────────────────────────────────────────
function Plot({data,layout,h=260}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    Plotly.newPlot(ref.current,data,{...PB,...layout},{responsive:true,displayModeBar:false});
    return()=>{try{Plotly.purge(ref.current)}catch(e){}}
  },[JSON.stringify({data,layout})]);
  return <div ref={ref} style={{width:'100%',minHeight:h}}/>
}

// ── METRIC CARD ──────────────────────────────────────────────────────────
function MCard({label,val,unit='',color='#818cf8',sub}){
  return <div style={{background:'linear-gradient(135deg,#141b2d,#0b0f1a)',border:'1px solid #1e293b',borderRadius:12,padding:'12px 14px'}}>
    <div style={{fontSize:9,color:'#475569',textTransform:'uppercase',letterSpacing:.8,marginBottom:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{label}</div>
    <div style={{fontSize:22,fontWeight:800,color,lineHeight:1.1}}>{val}<span style={{fontSize:11,color:'#475569',marginLeft:2}}>{unit}</span></div>
    {sub&&<div style={{fontSize:9,color:'#475569',marginTop:2,whiteSpace:'nowrap'}}>{sub}</div>}
  </div>
}

// ── SLIDER ───────────────────────────────────────────────────────────────
function Slider({label,min,max,val,step=1,set,fmt=v=>v}){
  return <div style={{marginBottom:20}}>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
      <span style={{fontSize:13,color:'#94a3b8'}}>{label}</span>
      <span style={{fontSize:13,fontWeight:700,color:'#818cf8'}}>{fmt(val)}</span>
    </div>
    <input type="range" min={min} max={max} step={step} value={val} onChange={e=>set(+e.target.value)}/>
  </div>
}

// ── SIDEBAR / SHEET CONTENT ───────────────────────────────────────────────
function Params({p,upd,run,loading,live}){
  const {N,M,C,cycles,nSims,target,metric}=p;
  return <>
    <div style={{fontSize:10,color:'#475569',fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:16}}>⚙ Parameters</div>
    <Slider label="Group Size (N)" min={2} max={50} val={N} set={v=>upd('N',v)} fmt={v=>`${v} members`}/>
    <Slider label="Simultaneous Raffles (M)" min={1} max={500} val={M} set={v=>upd('M',v)} fmt={v=>`${v} raffles`}/>
    <Slider label="Contribution (C)" min={10} max={5000} step={10} val={C} set={v=>upd('C',v)} fmt={v=>`${v} units`}/>
    <Slider label="Cycles" min={1} max={8} val={cycles} set={v=>upd('cycles',v)} fmt={v=>`${v} cycles`}/>
    <Slider label="Monte Carlo Runs" min={200} max={2000} step={100} val={nSims} set={v=>upd('nSims',v)} fmt={v=>v.toLocaleString()}/>
    <div style={{height:1,background:'#1e293b',margin:'4px 0 18px'}}/>
    <div style={{fontSize:10,color:'#475569',fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:14}}>🎯 Optimizer Target</div>
    <Slider label="Win Rate Target" min={51} max={99} val={target} set={v=>upd('target',v)} fmt={v=>`${v}%`}/>
    <div style={{display:'flex',gap:8,marginBottom:20}}>
      {['pwr1','pbe'].map(m=><button key={m} onClick={()=>upd('metric',m)} style={{flex:1,padding:'10px 0',borderRadius:8,fontSize:12,fontWeight:700,background:metric===m?'#4f46e5':'#1e293b',color:metric===m?'#fff':'#64748b',transition:'all .15s'}}>
        {m==='pwr1'?'Win Round 1':'Break-even'}
      </button>)}
    </div>
    <button onClick={run} disabled={loading} style={{width:'100%',padding:'14px 0',borderRadius:12,fontWeight:800,fontSize:15,background:loading?'#1e293b':'linear-gradient(90deg,#4f46e5,#7c3aed)',color:loading?'#475569':'#fff',transition:'all .15s'}}>
      {loading?'⏳ Computing…':'▶ Run Simulation'}
    </button>
    {live&&<div style={{marginTop:16,display:'flex',flexDirection:'column',gap:7}}>
      {[['P(Win Round 1)',live.pwr1.toFixed(1)+'%',pc(live.pwr1)],
        ['P(Break-even)',live.pbe.toFixed(1)+'%',pc(live.pbe)],
        ['E[First Win Round]',live.efw.toFixed(2),'#60a5fa'],
        ['Strategy Score',live.score.toFixed(1)+'/100',sc(live.score)]
      ].map(([l,v,c])=>
        <div key={l} style={{display:'flex',justifyContent:'space-between',background:'#141b2d',borderRadius:8,padding:'9px 12px'}}>
          <span style={{fontSize:11,color:'#64748b'}}>{l}</span>
          <span style={{fontSize:13,fontWeight:700,color:c}}>{v}</span>
        </div>
      )}
    </div>}
  </>
}

// ── TABS ─────────────────────────────────────────────────────────────────
const TABS=['📊 Distribution','💰 Wealth Sim','🎯 Strategy','⚡ Optimizer','📋 Data'];

// ── APP ──────────────────────────────────────────────────────────────────
function App(){
  const [p,setP]=useState({N:10,M:50,C:100,cycles:3,nSims:800,target:90,metric:'pwr1'});
  const [tab,setTab]=useState(0);
  const [res,setRes]=useState(null);
  const [loading,setLoading]=useState(false);
  const [sheet,setSheet]=useState(false);
  const upd=(k,v)=>setP(prev=>({...prev,[k]:v}));
  const {N,M,C,cycles,nSims,target,metric}=p;
  const live={pwr1:E.pwr1(M,N)*100,pbe:E.pbe(M,N)*100,efw:E.efw(M,N),score:E.score(M,N),var95:E.var95(M,N,C)};

  const run=useCallback(()=>{
    setLoading(true);setSheet(false);
    setTimeout(()=>{
      try{
        const mc=E.mc(N,M,C,cycles,nSims);
        const winPMF=E.winPMF(M,N),fwPMF=E.fwPMF(M,N);
        const sweep=E.sweep([5,10,20,50],[1,5,10,20,50,100,200,500,1000],C);
        const optM=E.opt(N,target,metric);
        setRes({mc,winPMF,fwPMF,sweep,optM});
      }catch(e){console.error(e)}
      setLoading(false);
    },30)
  },[N,M,C,cycles,nSims,target,metric]);

  useEffect(()=>{run()},[]);

  const heatZ=[5,10,20,50].map(n=>[1,5,10,20,50,100,200,500,1000].map(m=>+(E.pwr1(m,n)*100).toFixed(1)));
  const heatT=[5,10,20,50].map(n=>[1,5,10,20,50,100,200,500,1000].map(m=>(E.pwr1(m,n)*100).toFixed(0)+'%'));

  const ContentArea=()=><>
    {/* METRIC CARDS */}
    <div className="metric-grid">
      <MCard label="P(Win Round 1)" val={live.pwr1.toFixed(1)} unit="%" color={pc(live.pwr1)} sub={`M=${M} · N=${N}`}/>
      <MCard label="E[First Win]" val={live.efw.toFixed(2)} unit="rnd" color="#60a5fa" sub="Expected round"/>
      <MCard label="Strategy Score" val={live.score.toFixed(1)} unit="/100" color={sc(live.score)} sub={live.score>=75?'✅ Optimal':'⚠ Sub-opt'}/>
      <MCard label="VaR 95%" val={(Math.abs(live.var95)/1000).toFixed(1)} unit="kC" color="#f87171" sub="Worst 5%"/>
    </div>

    {!res&&<div style={{textAlign:'center',padding:'60px 20px',color:'#334155'}}>
      <div style={{fontSize:40,marginBottom:12}}>⚡</div>
      <div style={{fontSize:15,color:'#475569',marginBottom:6}}>Tap ▶ Run Simulation</div>
      <div style={{fontSize:12,color:'#334155'}}>Adjust parameters with the ⚙ button</div>
    </div>}

    {res&&<>
      {/* DISTRIBUTION */}
      {tab===0&&<>
        <div className="card" style={{marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:'#e2e8f0'}}>Win Count Distribution</div>
          <Plot data={[{type:'bar',x:res.winPMF.map(d=>d.k),y:res.winPMF.map(d=>d.p),marker:{color:'#818cf8',opacity:.85}}]}
            layout={{xaxis:{title:{text:'Total Wins'}},yaxis:{title:{text:'Probability'}}}}/>
        </div>
        <div className="card" style={{marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:'#e2e8f0'}}>First Win Round PMF</div>
          <Plot data={[{type:'bar',x:res.fwPMF.map(d=>d.r),y:res.fwPMF.map(d=>d.p),marker:{color:'#34d399',opacity:.85}}]}
            layout={{xaxis:{title:{text:'Round'}},yaxis:{title:{text:'Probability'}}}}/>
        </div>
        <div className="card">
          <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:'#e2e8f0'}}>Heatmap — P(Win R1) by N × M</div>
          <Plot data={[{type:'heatmap',z:heatZ,x:['1','5','10','20','50','100','200','500','1k'],y:['N=5','N=10','N=20','N=50'],colorscale:'Viridis',text:heatT,texttemplate:'%{text}',textfont:{size:9}}]}
            layout={{xaxis:{title:{text:'Raffles M'}},yaxis:{title:{text:'Group N'}}}} h={220}/>
        </div>
      </>}

      {/* WEALTH SIM */}
      {tab===1&&<div className="card">
        <div style={{fontWeight:700,fontSize:13,marginBottom:4,color:'#e2e8f0'}}>Cascade Wealth — {nSims.toLocaleString()} MC Runs</div>
        <div style={{fontSize:11,color:'#475569',marginBottom:10}}>Shaded band = P10–P90 · Dotted = cycle end</div>
        <Plot
          data={[
            {x:res.mc.rounds,y:res.mc.p90,type:'scatter',line:{color:'rgba(0,0,0,0)'},fill:'tonexty',fillcolor:'rgba(129,140,248,.08)',showlegend:false},
            {x:res.mc.rounds,y:res.mc.mn,type:'scatter',mode:'lines',line:{color:'#818cf8',width:2.5},name:'Mean',fill:'tonexty',fillcolor:'rgba(129,140,248,.08)'},
            {x:res.mc.rounds,y:res.mc.p10,type:'scatter',mode:'lines',line:{color:'rgba(129,140,248,.35)',width:1,dash:'dot'},name:'P10'},
            {x:res.mc.rounds,y:res.mc.p90,type:'scatter',mode:'lines',line:{color:'rgba(129,140,248,.35)',width:1,dash:'dot'},name:'P90'},
          ]}
          layout={{
            xaxis:{title:{text:'Round'}},yaxis:{title:{text:'Capital'}},
            shapes:res.mc.cb.map(cb=>({type:'line',x0:cb,x1:cb,y0:0,y1:1,yref:'paper',line:{color:'#334155',dash:'dot',width:1}})),
            annotations:res.mc.cb.map((cb,i)=>({x:cb,y:.95,yref:'paper',text:'C'+(i+2),showarrow:false,font:{size:9,color:'#64748b'}}))
          }} h={300}
        />
      </div>}

      {/* STRATEGY */}
      {tab===2&&<div className="card">
        <div style={{fontWeight:700,fontSize:13,marginBottom:4,color:'#e2e8f0'}}>Strategy ROI Matrix — N={N}</div>
        <div style={{fontSize:11,color:'#475569',marginBottom:10}}>Bubble = VaR95 · Color = Score · X = M (log)</div>
        <Plot
          data={[{type:'scatter',
            x:[1,5,10,20,50,100,200,500,1000],
            y:[1,5,10,20,50,100,200,500,1000].map(m=>E.pwr1(m,N)*100),
            mode:'markers+text',
            text:[1,5,10,20,50,100,200,500,1000].map(m=>'M='+m),
            textposition:'top center',textfont:{size:9},
            marker:{size:[1,5,10,20,50,100,200,500,1000].map(m=>Math.min(50,Math.sqrt(Math.abs(E.var95(m,N,C))/C)+6)),
              color:[1,5,10,20,50,100,200,500,1000].map(m=>E.score(m,N)),
              colorscale:'RdYlGn',showscale:true,colorbar:{title:'Score'},
              line:{width:1,color:'rgba(255,255,255,.15)'}}
          }]}
          layout={{xaxis:{type:'log',title:{text:'Raffles M'},tickvals:[1,5,10,50,100,500,1000],ticktext:['1','5','10','50','100','500','1k']},yaxis:{title:{text:'P(Win R1)%'}}}} h={300}
        />
      </div>}

      {/* OPTIMIZER */}
      {tab===3&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
        <div className="card" style={{textAlign:'center',padding:'24px 16px'}}>
          <div style={{fontSize:11,color:'#64748b',marginBottom:6}}>Optimal M for {target}% {metric==='pwr1'?'Win R1':'Break-even'}</div>
          <div style={{fontSize:80,fontWeight:900,lineHeight:1,background:'linear-gradient(135deg,#818cf8,#34d399)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>M={res.optM}</div>
          <div style={{fontSize:11,color:'#475569',marginTop:8}}>with N={N} members per raffle</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          <MCard label="Achieved" val={Math.round((metric==='pwr1'?E.pwr1(res.optM,N):E.pbe(res.optM,N))*100)} unit="%" color="#34d399"/>
          <MCard label="Score" val={E.score(res.optM,N).toFixed(1)} unit="/100" color={sc(E.score(res.optM,N))}/>
          <MCard label="E[Win]" val={E.efw(res.optM,N).toFixed(2)} unit="rnd" color="#60a5fa"/>
        </div>
        <div className="card">
          <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:'#e2e8f0'}}>Strategy Zones</div>
          {[['🟡 Conservative',N,'M = N','Low exposure, moderate rate'],
            ['🟢 Optimal',N*5,'M = 4–5N','Peak score — recommended'],
            ['🔴 Aggressive',N*10,'M = 10N','Max speed, high exposure']
          ].map(([zone,m,f,d])=>
            <div key={zone} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,padding:'11px 14px',borderRadius:10,
              background:res.optM===m?'rgba(79,70,229,.15)':'rgba(255,255,255,.02)',
              border:res.optM===m?'1px solid #4f46e5':'1px solid #1e293b'}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:12,color:'#e2e8f0'}}>{zone} <span style={{color:'#4f46e5',fontSize:10}}>{f}</span></div>
                <div style={{fontSize:10,color:'#64748b',marginTop:2}}>{d}</div>
              </div>
              <div style={{fontWeight:700,color:'#818cf8',fontSize:13}}>M={m}</div>
            </div>
          )}
        </div>
      </div>}

      {/* DATA TABLE */}
      {tab===4&&<div className="card" style={{overflowX:'auto'}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:'#e2e8f0'}}>Parameter Sweep — {res.sweep.length} scenarios</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,minWidth:380}}>
          <thead><tr style={{background:'#0b0f1a'}}>
            {['N','M','WR1%','BE%','E[FW]','Score','VaR'].map(h=><th key={h} style={{padding:'7px 8px',textAlign:'left',color:'#64748b',fontWeight:600,borderBottom:'1px solid #1e293b'}}>{h}</th>)}
          </tr></thead>
          <tbody>{res.sweep.map((r,i)=>
            <tr key={i} style={{borderBottom:'1px solid #0f1422',background:r.N===N&&r.M===M?'rgba(79,70,229,.1)':i%2?'rgba(255,255,255,.01)':'transparent'}}>
              <td style={{padding:'6px 8px',color:'#64748b'}}>{r.N}</td>
              <td style={{padding:'6px 8px',color:'#e2e8f0',fontWeight:600}}>{r.M}</td>
              <td style={{padding:'6px 8px',color:pc(r.pwr1)}}>{r.pwr1}%</td>
              <td style={{padding:'6px 8px',color:pc(r.pbe)}}>{r.pbe}%</td>
              <td style={{padding:'6px 8px',color:'#60a5fa'}}>{r.efw}</td>
              <td style={{padding:'6px 8px',color:sc(r.score)}}>{r.score}</td>
              <td style={{padding:'6px 8px',color:'#f87171'}}>{r.var95}k</td>
            </tr>)}
          </tbody>
        </table>
      </div>}
    </>}
  </>;

  return <div style={{height:'100dvh',display:'flex',flexDirection:'column',overflow:'hidden'}}>

    {/* ── HEADER ── */}
    <div style={{flexShrink:0,background:'linear-gradient(90deg,#0f0c29,#0b0f1a)',borderBottom:'1px solid #1e293b',padding:'10px 14px',display:'flex',alignItems:'center',gap:10}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:18,fontWeight:800,background:'linear-gradient(90deg,#818cf8,#34d399)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>⬡ Equb Win Simulator</div>
        <div style={{fontSize:10,color:'#334155',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>ROSCA · N={N} · M={M} · C={C} units</div>
      </div>
      <button onClick={()=>setSheet(true)} style={{flexShrink:0,padding:'8px 14px',borderRadius:9,background:'#1e293b',color:'#818cf8',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',gap:5}}>
        <span>⚙</span><span>Params</span>
      </button>
      <button onClick={run} disabled={loading} style={{flexShrink:0,padding:'8px 14px',borderRadius:9,background:loading?'#1e293b':'linear-gradient(90deg,#4f46e5,#7c3aed)',color:'#fff',fontSize:12,fontWeight:800,whiteSpace:'nowrap'}}>
        {loading?'⏳':'▶ Run'}
      </button>
    </div>

    {/* ── TABS ── */}
    <div className="tabs-row" style={{flexShrink:0}}>
      {TABS.map((t,i)=><button key={t} className={`tab-btn${tab===i?' on':''}`} onClick={()=>setTab(i)}>{t}</button>)}
    </div>

    {/* ── MOBILE: full-width scroll area ── */}
    <div className="mobile-only" style={{flex:1,overflowY:'auto',padding:'12px 12px 80px',WebkitOverflowScrolling:'touch'}}>
      <ContentArea/>
    </div>

    {/* ── DESKTOP: sidebar + content ── */}
    <div className="desktop-layout" style={{flex:1,minHeight:0}}>
      <div className="desktop-sidebar">
        <Params p={p} upd={upd} run={run} loading={loading} live={live}/>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'16px 16px 24px'}}>
        <ContentArea/>
      </div>
    </div>

    {/* ── BOTTOM SHEET (mobile params) ── */}
    {sheet&&<>
      <div className="sheet-overlay" onClick={()=>setSheet(false)}/>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontSize:15,fontWeight:700,color:'#818cf8'}}>⬡ Parameters</span>
          <button onClick={()=>setSheet(false)} style={{background:'#1e293b',color:'#94a3b8',borderRadius:8,padding:'6px 10px',fontSize:13,fontWeight:700}}>✕ Close</button>
        </div>
        <Params p={p} upd={upd} run={()=>{run();}} loading={loading} live={live}/>
        <div style={{height:20}}/>
      </div>
    </>}

    {/* ── FOOTER ── */}
    <div style={{flexShrink:0,background:'#070b14',borderTop:'1px solid #0f1628',padding:'5px 14px',fontSize:9,color:'#1e293b',display:'flex',justifyContent:'space-between'}}>
      <span style={{color:'#1e2d45'}}>Equb Win Simulator · ROSCA · 100% in-browser</span>
      <span style={{color:'#1e2d45'}}>N={N} · M={M} · C={C}</span>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
